[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
base = "${BASE_RPC_URL}"
optimism = "${OPTIMISM_RPC_URL}"
avalanche = "${AVALANCHE_RPC_URL}"
celo = "${CELO_RPC_URL}"
fuji = "https://api.avax-test.network/ext/bc/C/rpc"
alfajores = "https://alfajores-forno.celo-testnet.org"

[etherscan]
base = { key = "${BASESCAN_KEY}", url = "https://api.basescan.org/api" }
optimism = { key = "${OPSCAN_KEY}", url = "https://api-optimistic.etherscan.io/api" }
avalanche = { key = "${SNOWSCAN_KEY}", url = "https://api.snowscan.xyz/api" }
celo = { key = "${CELOSCAN_KEY}", url = "https://api.celoscan.io/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
